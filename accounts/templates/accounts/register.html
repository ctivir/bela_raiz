<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Register | Bela Raiz</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-md mx-auto bg-white shadow-md rounded p-6">
    <h1 class="text-2xl font-bold mb-4">Sign Up</h1>
    <form id="register-form" hx-post="/api/accounts/register/" hx-target="#result" hx-swap="innerHTML">
        <label class="block mb-2">Username<input name="username" required class="w-full border p-2"/></label>
        <label class="block mb-2">Email<input name="email" type="email" required class="w-full border p-2"/></label>
        <label class="block mb-2">First name<input name="first_name" required class="w-full border p-2"/></label>
        <label class="block mb-2">Last name<input name="last_name" required class="w-full border p-2"/></label>
        <label class="block mb-2">Phone (+258...)
            <input name="phone_number" required pattern="\+258\d{8,9}" class="w-full border p-2"/>
        </label>
        <label class="block mb-2">Role
            <select name="role" required class="w-full border p-2">
                <option value="client">Client</option>
                <option value="salon">Salon</option>
                <option value="reseller">Reseller</option>
                <option value="courier">Courier</option>
            </select>
        </label>
        <label class="block mb-2">Password<input name="password" type="password" required class="w-full border p-2"/></label>
        <label class="block mb-2">Confirm Password<input name="password2" type="password" required class="w-full border p-2"/></label>
        <button type="submit" class="mt-4 bg-green-500 text-white px-4 py-2 rounded">Register</button>
    </form>
    <div id="result" class="mt-4 text-red-600"></div>
    <p class="mt-2 text-sm">Already have an account? <a href="/accounts/login_page/" class="text-blue-500">Log in</a></p>
</div>
</body>
</html>
