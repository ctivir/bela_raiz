<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Login | Bela Raiz</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-100 p-6">
<div class="max-w-md mx-auto bg-white shadow-md rounded p-6">
    <h1 class="text-2xl font-bold mb-4">Login</h1>
    <form id="login-form" hx-post="/api/accounts/login/" hx-target="#result" hx-swap="innerHTML">
        <label class="block mb-2">Username<input name="username" required class="w-full border p-2"/></label>
        <label class="block mb-2">Password<input name="password" type="password" required class="w-full border p-2"/></label>
        <button type="submit" class="mt-4 bg-blue-500 text-white px-4 py-2 rounded">Log In</button>
    </form>
    <div id="result" class="mt-4 text-red-600"></div>
    <p class="mt-2 text-sm">Don't have an account? <a href="/accounts/register_page/" class="text-blue-500">Sign up</a></p>
</div>
</body>
</html>
